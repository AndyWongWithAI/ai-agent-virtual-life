[project]
name = "ai-agent-virtual-life"
version = "0.1.0"
description = "LLM 驱动的虚拟小镇,智能体 24/7 在跑"
requires-python = ">=3.12"
dependencies = []

[tool.uv.workspace]
members = [
    "packages/llm-client",
    "packages/memory-reflection",
    "packages/event-bus",
]

[tool.uv.sources]
llm-client = { workspace = true }
memory-reflection = { workspace = true }
event-bus = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages"]