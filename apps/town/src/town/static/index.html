<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI 智能体小镇 - 观察者视角</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>AI 智能体小镇 <span id="paused-badge" class="hidden">⏸ 已暂停</span></h1>
  <div id="clock"></div>
  <button id="pause-toggle" type="button">⏸ 暂停</button>
  <!-- 阶段 3 收尾(任务 T9):重启生效 — 改了 TOWN_DATA_DIR / YAML 后点一下 -->
  <button id="restart-toggle" type="button">🔄 重启生效</button>
  <div id="map-container">
    <canvas id="map" width="800" height="500"></canvas>
  </div>
  <div id="events"></div>
  <!-- 阶段 3 (REQ-7cfc9696):YAML 配置错误 toast 容器 -->
  <div id="config-toast" class="hidden"></div>
  <div id="current-panel">
    <div class="panel-tabs">
      <button class="tab-btn active" data-tab="status">近况</button>
      <button class="tab-btn" data-tab="director">导演</button>
    </div>
    <div id="tab-status" class="tab-pane">
      <div id="current-list"></div>
    </div>
    <div id="tab-director" class="tab-pane hidden">
      <div class="director-block">
        <h4>场景注入</h4>
        <textarea id="scene-content" placeholder="例:今天李四过生日,大家准备惊喜" maxlength="200"></textarea>
        <button id="scene-inject" type="button">注入场景</button>
      </div>
      <div class="director-block">
        <h4>时间控制</h4>
        <div class="speed-buttons">
          <button data-speed="0.5" type="button">0.5x</button>
          <button data-speed="1.0" class="active" type="button">1x</button>
          <button data-speed="2.0" type="button">2x</button>
          <button data-speed="4.0" type="button">4x</button>
        </div>
        <button id="director-pause" type="button">⏸ 暂停</button>
      </div>
      <div class="director-block">
        <h4>时间倒带</h4>
        <input type="datetime-local" id="replay-ts">
        <button id="replay-fetch" type="button">拉取</button>
        <div id="replay-output"></div>
      </div>
    </div>
  </div>
  <div id="agent-panel" class="hidden">
    <button id="agent-panel-close" aria-label="关闭">×</button>
    <h3 id="agent-panel-name"></h3>
    <div id="agent-panel-persona"></div>
    <div id="agent-panel-location"></div>
    <h4>状态</h4>
    <div id="agent-panel-status"></div>
    <h4>近期记忆</h4>
    <div id="agent-panel-summaries"></div>
    <h4>近期事件</h4>
    <div id="agent-panel-events"></div>
  </div>
  <div id="command-panel">
    <select id="command-agent">
      <option value="">-- 选择 agent --</option>
    </select>
    <input id="command-input" type="text" placeholder="输入指令,如:去买菜" maxlength="100" />
    <button id="command-send">发送</button>
    <span id="command-status"></span>
  </div>
  <script src="/static/canvas.js"></script>
</body>
</html>
