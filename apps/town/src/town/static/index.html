<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI 智能体小镇 - 观察者视角</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>AI 智能体小镇 <span id="paused-badge" class="hidden">⏸ 已暂停</span></h1>
  <div id="clock"></div>
  <button id="pause-toggle" type="button">⏸ 暂停</button>
  <div id="map-container">
    <canvas id="map" width="800" height="500"></canvas>
  </div>
  <div id="events"></div>
  <div id="current-panel">
    <h3>近况</h3>
    <div id="current-list"></div>
  </div>
  <div id="agent-panel" class="hidden">
    <button id="agent-panel-close" aria-label="关闭">×</button>
    <h3 id="agent-panel-name"></h3>
    <div id="agent-panel-persona"></div>
    <div id="agent-panel-location"></div>
    <h4>状态</h4>
    <div id="agent-panel-status"></div>
    <h4>近期记忆</h4>
    <div id="agent-panel-summaries"></div>
    <h4>近期事件</h4>
    <div id="agent-panel-events"></div>
  </div>
  <div id="command-panel">
    <select id="command-agent">
      <option value="">-- 选择 agent --</option>
    </select>
    <input id="command-input" type="text" placeholder="输入指令,如:去买菜" maxlength="100" />
    <button id="command-send">发送</button>
    <span id="command-status"></span>
  </div>
  <script src="/static/canvas.js"></script>
</body>
</html>
