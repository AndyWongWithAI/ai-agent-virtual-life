[project]
name = "event-bus"
version = "0.1.0"
description = "Redis 发布-订阅事件总线(L1 组件)"
requires-python = ">=3.12"
dependencies = [
  "redis>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/event_bus"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]
