[project]
name = "virtual-world-engine"
version = "0.1.0"
description = "L2 virtual world: 5 fixed locations + adjacency + real-time clock"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/virtual_world_engine"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
