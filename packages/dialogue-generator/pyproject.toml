[project]
name = "dialogue-generator"
version = "0.1.0"
description = "L2 对话生成器:触发判断 + LLM 生成双人对话"
requires-python = ">=3.12"
dependencies = ["llm-client"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dialogue_generator"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]
