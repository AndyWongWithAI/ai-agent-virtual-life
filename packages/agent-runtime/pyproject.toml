[project]
name = "agent-runtime"
version = "0.1.0"
description = "感知-决策-行动循环 + 作息锁(L1 组件)"
requires-python = ">=3.12"
dependencies = [
  "llm-client",
  "memory-reflection",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_runtime"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]