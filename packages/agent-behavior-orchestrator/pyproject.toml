[project]
name = "agent-behavior-orchestrator"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["virtual-world-engine"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_behavior_orchestrator"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]